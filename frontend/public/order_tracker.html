<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIRTAC Order Tracker</title>
  <link rel="stylesheet" href="/css/style.css" />
  <script src="/js/theme-secret.js" defer></script>
  <script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "w8ez9eik4w");
  </script>
</head>
<body class="customer-tracker-page">
  <main class="tracker-shell">
    <header class="tracker-hero">
      <p class="tracker-kicker">AIRTAC Order Tracker</p>
      <p id="trackerOrderNumber" class="tracker-order-number">Order loading...</p>
      <p id="trackerUpdated" class="tracker-updated">Checking for updates...</p>
    </header>

    <section id="trackerStatusCard" class="tracker-orb-card" data-tone="info" data-awake="sleeping">
      <div class="tracker-orb-wrap">
        <div class="tracker-orb">
          <svg class="tracker-orb-ring" viewBox="0 0 240 240" aria-hidden="true">
            <g id="trackerProgressSegments"></g>
          </svg>
          <div class="tracker-orb-core">
            <div class="tracker-orb-face" aria-hidden="true">
              <span class="tracker-orb-dial-scale tracker-orb-dial-scale--rim"></span>
              <span class="tracker-orb-dial-scale tracker-orb-dial-scale--rim-major"></span>
              <span class="tracker-orb-eye tracker-orb-eye--left"></span>
              <span class="tracker-orb-eye tracker-orb-eye--right"></span>
            </div>
          </div>
        </div>
      </div>

      <div class="tracker-terminal" role="status" aria-live="polite">
        <span class="tracker-terminal-label">REGGIE //</span>
        <span id="trackerStageText" class="tracker-terminal-text">Fetching the latest workshop update.</span>
        <span class="tracker-terminal-caret" aria-hidden="true"></span>
      </div>

      <div id="trackerTrackingLinks" class="tracker-tracking-links" hidden></div>
    </section>

    <section class="tracker-help-strip">
      <article class="tracker-note-card">
        <p class="tracker-note-kicker">While you wait</p>
        <ul id="trackerTips" class="tracker-list"></ul>
      </article>
    </section>

    <section class="tracker-details">
      <details class="tracker-disclosure">
        <summary>View order items</summary>
        <div id="trackerItems" class="tracker-items"></div>
      </details>

      <details class="tracker-disclosure">
        <summary>View full timeline</summary>
        <div id="trackerTimeline" class="tracker-timeline"></div>
      </details>
    </section>
  </main>

  <script src="/js/order-tracker.js"></script>
</body>
</html>
